<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baby Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
    html,
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #f0f8ff 0%, #fff7e6 100%);
        min-height: 100vh;
        overflow: hidden;
    }

    .quiz-shell {
        max-width: 1100px;
        width: 100%;
    }

    .quiz-card {
        border: 0;
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(48, 84, 122, 0.12);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(6px);
        max-height: calc(100vh - 1rem);
        overflow: hidden;
    }

    h1 {
        font-size: clamp(1.5rem, 3vw, 3rem);
        font-weight: 700;
    }

    .category {
        font-size: clamp(1rem, 1.8vw, 1.5rem);
        color: #555;
    }

    .choice-card {
        background: #fff;
        padding: clamp(0.55rem, 1.2vw, 1rem);
        cursor: pointer;
        border: 4px solid transparent;
        border-radius: 20px;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        box-shadow: 0 10px 24px rgba(33, 59, 89, 0.08);
        height: 100%;
        text-align: center;
    }

    .choice-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 28px rgba(33, 59, 89, 0.14);
    }

    .choice-card img {
        width: 100%;
        height: clamp(88px, 16vh, 220px);
        object-fit: contain;
        background: #fff;
        border-radius: 16px;
    }

    .label {
        margin-top: 0.6rem;
        font-size: clamp(0.95rem, 1.5vw, 1.25rem);
        font-weight: bold;
        color: #28435f;
        line-height: 1.2;
    }

    .correct {
        border-color: green;
    }

    .wrong {
        border-color: red;
    }

    #playBtn {
        font-size: clamp(0.95rem, 1.2vw, 1rem);
        padding: 0.6rem 1.25rem;
        border-radius: 999px;
    }

    @media (max-width: 575.98px) {
        .container {
            padding-top: 0.5rem !important;
            padding-bottom: 0.5rem !important;
        }

        .quiz-card {
            border-radius: 18px;
        }

        .choice-card {
            padding: 0.55rem;
        }

        .choice-card img {
            height: min(15vh, 110px);
        }

        .label {
            margin-top: 0.45rem;
            font-size: 0.9rem;
        }
    }
</style>
</head>

<body>

<div class="container min-vh-100 d-flex align-items-center py-2 py-md-3">
    <div class="quiz-shell mx-auto">
        <div class="quiz-card text-center p-3 p-md-4 p-lg-5">
            <h1 class="mb-2">Tap the correct image</h1>
            <div class="category mb-3" id="categoryName"></div>
            <div id="audioHint" class="alert alert-info py-2 px-3 mb-3 d-none" role="status">
                Tap once to enable the voice prompt.
            </div>

            <button id="playBtn" class="btn btn-primary btn-lg shadow-sm mb-3 mb-md-4">Play Again</button>

            <div class="row g-2 g-md-3 g-lg-4 images justify-content-center">
                <div class="col-6 col-lg-4">
                    <div class="choice-card item">
                        <img id="img1" alt="Quiz choice 1">
                        <div class="label" id="label1"></div>
                    </div>
                </div>
                <div class="col-6 col-lg-4">
                    <div class="choice-card item">
                        <img id="img2" alt="Quiz choice 2">
                        <div class="label" id="label2"></div>
                    </div>
                </div>
                <div class="col-8 col-sm-6 col-lg-4">
                    <div class="choice-card item">
                        <img id="img3" alt="Quiz choice 3">
                        <div class="label" id="label3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="startModal" tabindex="-1" aria-labelledby="startModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-body text-center p-4 p-md-5">
                <h2 class="h3 mb-3" id="startModalLabel">Ready to play?</h2>
                <p class="text-muted mb-4">Tap start and the quiz will say which picture to find.</p>
                <button id="startGameBtn" type="button" class="btn btn-primary btn-lg px-4">Start Quiz</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

const data = {
    Animals: [
        { name: "Dog", src: "images/dog.jpg" },
        { name: "Cat", src: "images/cat.jpg" },
        { name: "Cow", src: "images/cow.jpg" },
        { name: "Lion", src: "images/lion.jpg" },
        { name: "Elephant", src: "images/elephant.jpg" }
    ],
    Fruits: [
        { name: "Apple", src: "images/apple.jpg" },
        { name: "Banana", src: "images/banana.jpg" },
        { name: "Orange", src: "images/orange.jpg" },
        { name: "Mango", src: "images/mango.jpg" },
        { name: "Grapes", src: "images/grapes.jpg" }
    ],
    Vehicles: [
        { name: "Car", src: "images/car.jpg" },
        { name: "Bus", src: "images/bus.jpg" },
        { name: "Bike", src: "images/bike.jpg" },
        { name: "Train", src: "images/train.jpg" },
        { name: "Truck", src: "images/truck.jpg" }
    ]
};

let currentCorrect = "";
let speechUnlocked = false;
let pendingSpeechText = "";
let startModal;

function speak(text) {
    pendingSpeechText = text;
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 0.7;
    speech.pitch = 1.2;
    speech.lang = "en-US";
    speech.onstart = function () {
        speechUnlocked = true;
        pendingSpeechText = "";
        $("#audioHint").addClass("d-none");
    };

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);

    setTimeout(() => {
        if (!speechUnlocked && window.speechSynthesis.speaking === false) {
            $("#audioHint").removeClass("d-none");
        }
    }, 250);
}

function startGame() {
    speechUnlocked = true;
    $("#audioHint").addClass("d-none");
    loadGame();
}

function getRandomCategory() {
    const keys = Object.keys(data);
    return keys[Math.floor(Math.random() * keys.length)];
}

function loadGame() {
    $(".choice-card").removeClass("correct wrong");

    let category = getRandomCategory();
    let items = [...data[category]];

    $("#categoryName").text("Category: " + category);

    let shuffled = items.sort(() => 0.5 - Math.random()).slice(0, 3);

    $("#img1").attr("src", shuffled[0].src).data("name", shuffled[0].name);
    $("#label1").text(shuffled[0].name);

    $("#img2").attr("src", shuffled[1].src).data("name", shuffled[1].name);
    $("#label2").text(shuffled[1].name);

    $("#img3").attr("src", shuffled[2].src).data("name", shuffled[2].name);
    $("#label3").text(shuffled[2].name);

    currentCorrect = shuffled[Math.floor(Math.random() * 3)].name;
    speak("Find " + currentCorrect);
}

$("#playBtn").off("click").on("click", function () {
    speak("Find " + currentCorrect);
});

$(document).off("click.speechunlock touchstart.speechunlock").on("click.speechunlock touchstart.speechunlock", function () {
    if (!speechUnlocked && pendingSpeechText) {
        speak(pendingSpeechText);
    }
});

$(".images img").off("click").on("click", function () {
    let selected = $(this).data("name");
    let choiceCard = $(this).closest(".choice-card");

    if (selected === currentCorrect) {
        speak("Great job!");
        choiceCard.addClass("correct");
        loadGame();
    } else {
        choiceCard.addClass("wrong");
        speak("Try again");
    }
});

$("#startGameBtn").off("click").on("click", function () {
    if (startModal) {
        startModal.hide();
    }
    startGame();
});

$(function () {
    startModal = new bootstrap.Modal(document.getElementById("startModal"));
    startModal.show();
});

</script>

</body>
</html>
